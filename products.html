<script>

window.addEventListener("scroll", function () {
  const topbar = document.querySelector(".topbar");

  if (window.scrollY > 10) {
    topbar.classList.add("scrolled");
  } else {
    topbar.classList.remove("scrolled");
  }
});

function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}




// modal
function openModal(card) {
  const modal = document.getElementById("modal");
  const container = document.getElementById("checkout-container");

  container.innerHTML = `
    <iframe 
      src="${card.dataset.link}" 
      style="width:100%; height:100%; border:0;"
      allowfullscreen
      allowpaymentrequest
      scrolling="no"
      data-hide-header="true"
      data-hide-merchant-logo="true"
      data-hide-badge-secure="true"
      data-hide-language="true"
    ></iframe>
  `;

  modal.style.display = "block";

  // reload mayar script
  setTimeout(() => {
    const oldScript = document.querySelector('script[src*="mayarEmbed"]');
    if (oldScript) oldScript.remove();

    const script = document.createElement("script");
    script.src = "https://mayarembed.r2.mayar.id/mayarEmbed.min.js";
    script.async = true;
    document.body.appendChild(script);
  }, 100);
}

// close
document.getElementById("close").onclick = () => {
  document.getElementById("modal").style.display = "none";
  document.getElementById("checkout-container").innerHTML = "";
};



// filter & search
const buttons = document.querySelectorAll(".filter-bar button");
const cards = document.querySelectorAll(".product-link");
document.addEventListener("click", function(e) {
  const card = e.target.closest(".product-link");

  if (card) {
    e.preventDefault();
    openModal(card);
  }
});
const searchBox = document.getElementById("searchBox");

let currentFilter = "all";

// klik tombol filter
buttons.forEach(btn => {
  btn.addEventListener("click", () => {

    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

// search input
searchBox.addEventListener("input", applyFilter);

// fungsi utama filter + search
function applyFilter() {
  const keyword = searchBox.value.toLowerCase();

  cards.forEach(card => {
    const category = card.dataset.category;
    const name = card.dataset.name.toLowerCase();

    const matchFilter = (currentFilter === "all" || category === currentFilter);
    const matchSearch = name.includes(keyword);

    card.style.display = (matchFilter && matchSearch) ? "block" : "none";
  });
}

window.onclick = function(e) {
  const modal = document.getElementById("modal");
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

cards.forEach(card => {
  const mainImg = card.querySelector(".main-img");
  const hoverImg = card.querySelector(".hover-img");

  card.addEventListener("mouseenter", () => {
    if (hoverImg) {
      mainImg.style.opacity = "0";
      hoverImg.style.opacity = "1";
    }
  });

  card.addEventListener("mouseleave", () => {
    mainImg.style.opacity = "1";
    hoverImg.style.opacity = "0";
  });
});
document.getElementById("close").onclick = () => {
  document.getElementById("modal").style.display = "none";
  document.getElementById("checkout-container").innerHTML = "";
};


function openModal(card) {
  const modal = document.getElementById("modal");
  const container = document.getElementById("checkout-container");

 
  container.innerHTML = `
    <iframe 
      src="${card.dataset.link}" 
      style="width:100%; height:100%; border:0;"
      allowfullscreen
      allowpaymentrequest
      scrolling="yes"
      data-hide-product-images="true"
      data-hide-merchant-logo="true"
      data-hide-badge-secure="true"
      data-hide-language="true"
    ></iframe>
  `;

  modal.style.display = "block";

  // reload mayar script
  setTimeout(() => {
    const oldScript = document.querySelector('script[src*="mayarEmbed"]');
    if (oldScript) oldScript.remove();

    const script = document.createElement("script");
    script.src = "https://mayarembed.r2.mayar.id/mayarEmbed.min.js";
    script.async = true;
    document.body.appendChild(script);
  }, 100);
}
</script>
