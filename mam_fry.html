<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI FREYA_MAM</title>
    <style>
       {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
                     
            background-image: url('https://waytitiai.github.io/ytta/images/frys.webp'); 
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

       
.container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(10px);          
            -webkit-backdrop-filter: blur(10px);  
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

       
        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: #ffffff; 
        }

       
        .image-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

       
        .button-group {
            display: flex;
            gap: 15px; /* Jarak antara tombol kiri dan kanan */
            width: 100%;
            margin-top: 25px;
        }

        
        .cta-button {
            flex: 1; /* Membuat kedua tombol memiliki lebar yang sama besar */
            padding: 15px 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-align: center;
        }

       
        .btn-primary {
            background-color: #007bff;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

      
        .btn-secondary {
            background-color: #28a745;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-secondary:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

      
        .cta-button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
     <div class="image-wrapper">
           
            <iframe src="https://drive.google.com/file/d/1LyyDSgdDgK3reJQj1_4TygjD9uV9IXd0/preview?rm=minimal" allow="autoplay"></iframe>
        </div>
<div class="button-group">
            <a href="https://drive.google.com/file/d/1l-mDKlDqKWbWa_BzyAatw8CZ3csbc2qw/preview?rm=minimal" class="cta-button btn-primary">AKSES LANGSUNG DISINI!</a>
            <a href="https://drive.google.com/drive/home" class="cta-button btn-secondary">AKSES VIA G-DRIVE KAMU</a>
        </div>
        
    </div>

</body>
</html>
